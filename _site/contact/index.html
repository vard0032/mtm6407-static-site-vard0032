<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Sophia Hannah Vardy</a>
    <div>
      <a class="text-white mx-2" href="/mtm6407-static-site-vard0032/">Home</a>
      <a class="text-white mx-2" href="/mtm6407-static-site-vard0032/about/">About</a>
      <a class="text-white mx-2" href="/mtm6407-static-site-vard0032/portfolio/">Portfolio</a>
      <a class="text-white mx-2" href="/mtm6407-static-site-vard0032/blog/">Blog</a>
      <a class="text-white mx-2" href="/mtm6407-static-site-vard0032/contact/">Contact</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  
<div class="row align-items-center">

  <!-- FORM -->
  <div class="col-md-6 mb-4">
    <h1>Contact Me</h1>
    <p>Feel free to reach out for collaborations or inquiries.</p>

    <form>
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" placeholder="Your name">
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Your email">
      </div>

      <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea class="form-control" rows="4" placeholder="Your message"></textarea>
      </div>

      <button type="submit" class="btn btn-dark">Send Message</button>
    </form>
  </div>

  <!-- IMAGE -->
  <div class="col-md-6 text-center">
    <img src="/assets/images/contact.jpeg" class="contact-img">
  </div>

</div>
</div>

</body>

<style>
  body {
  font-family: 'Poppins', sans-serif;
}

  .hero {
  height: 80vh;
  background: url('../assets/images/hero.png')center/cover no-repeat;
  position: relative;
}

.hero::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.hero .container {
  position: relative;
  z-index: 2;
}

.card {
  border: none;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  height: 200px;
  object-fit: cover;
}

form {
  background: #f8f9fa;
  padding: 20px;
  border-radius: 10px;
}

.contact-img {
  max-height: 400px;
  width: 100%;
  object-fit: cover;
  border-radius: 10px;
}

.card {
  border: none;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1, h2, h5 {
  font-weight: 600;
}
</style>
</html>
